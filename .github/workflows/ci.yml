name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Swift Tests
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup test Keychain
        run: |
          security create-keychain -p "" ci-test.keychain
          security list-keychains -d user -s ci-test.keychain $(security list-keychains -d user | tr -d '"' | xargs)
          security default-keychain -s ci-test.keychain
          security unlock-keychain -p "" ci-test.keychain
          security set-keychain-settings -t 3600 -l ci-test.keychain

      - name: Run tests
        run: swift test
