name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Swift Tests
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Setup test Keychain
        run: |
          security create-keychain -p "" ci-test.keychain
          security list-keychains -d user -s ci-test.keychain $(security list-keychains -d user | tr -d '"' | xargs)
          security default-keychain -s ci-test.keychain
          security unlock-keychain -p "" ci-test.keychain
          security set-keychain-settings -t 3600 -l ci-test.keychain

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test

  lint:
    name: SwiftLint
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install SwiftLint
        run: brew install swiftlint 2>/dev/null || true

      - name: Lint (warnings only — strict mode enabled after cleanup)
        run: swiftlint lint --reporter github-actions-logging
