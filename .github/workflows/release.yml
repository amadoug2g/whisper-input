name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.1)"
        required: true
        default: "1.1"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build, sign, notarize, and publish
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"' | xargs)
          security default-keychain -s "$KEYCHAIN_PATH"

      - name: Build release
        run: swift build -c release

      - name: Package app bundle
        run: bash scripts/package-app.sh

      - name: Sign with Developer ID
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --deep --options runtime \
            --sign "Developer ID Application: Amadougaye Cisse ($APPLE_TEAM_ID)" \
            --entitlements Memo.entitlements \
            Memo.app

          echo "→ Verifying signature"
          codesign --verify --verbose Memo.app
          spctl --assess --type execute --verbose Memo.app || true

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "→ Creating zip for notarization"
          ditto -c -k --keepParent Memo.app Memo-notarize.zip

          echo "→ Submitting to Apple notarization service"
          xcrun notarytool submit Memo-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          echo "→ Stapling notarization ticket"
          xcrun stapler staple Memo.app

          rm Memo-notarize.zip

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          bash scripts/package-dmg.sh "$VERSION"

      - name: Sign DMG
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          codesign --force \
            --sign "Developer ID Application: Amadougaye Cisse ($APPLE_TEAM_ID)" \
            "Memo-v${VERSION}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "Memo v${{ steps.version.outputs.version }}"
          body_path: CHANGELOG.md
          files: Memo-v${{ steps.version.outputs.version }}.dmg
          draft: false
          prerelease: false

  smoke-test:
    name: Smoke test DMG
    runs-on: macos-14
    needs: build-and-release

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download DMG from release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release download "v${VERSION}" \
            --pattern "Memo-v${VERSION}.dmg" \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mount DMG and verify Memo.app
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG="Memo-v${VERSION}.dmg"

          echo "→ Attaching $DMG"
          MOUNT_OUTPUT=$(hdiutil attach "$DMG" -nobrowse -noautoopen)
          MOUNT_POINT=$(echo "$MOUNT_OUTPUT" | grep -E '/Volumes/' | tail -1 | awk '{print $NF}')

          echo "→ Mounted at: $MOUNT_POINT"
          ls -la "$MOUNT_POINT"

          echo "→ Verifying Memo.app"
          if [ ! -d "$MOUNT_POINT/Memo.app" ]; then
            echo "ERROR: Memo.app not found in DMG" >&2
            hdiutil detach "$MOUNT_POINT" -quiet || true
            exit 1
          fi

          echo "→ Checking code signature"
          codesign --verify --verbose "$MOUNT_POINT/Memo.app"

          echo "→ Checking notarization"
          spctl --assess --type execute --verbose "$MOUNT_POINT/Memo.app"

          echo "→ Detaching DMG"
          hdiutil detach "$MOUNT_POINT" -quiet

          echo "Smoke test passed: signed, notarized, and verified"
