name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0)"
        required: true
        default: "1.0"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build DMG and publish release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup test Keychain
        run: |
          security create-keychain -p "" build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"' | xargs)
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain

      - name: Build app and create DMG
        run: make dmg VERSION=${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "Memo v${{ steps.version.outputs.version }}"
          body_path: CHANGELOG.md
          files: Memo-v${{ steps.version.outputs.version }}.dmg
          draft: false
          prerelease: false

  smoke-test:
    name: Smoke test DMG
    runs-on: macos-14
    needs: build-and-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download DMG from release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release download "v${VERSION}" \
            --pattern "Memo-v${VERSION}.dmg" \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mount DMG and verify Memo.app
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG="Memo-v${VERSION}.dmg"

          echo "→ Attaching $DMG"
          MOUNT_OUTPUT=$(hdiutil attach "$DMG" -nobrowse -noautoopen)
          MOUNT_POINT=$(echo "$MOUNT_OUTPUT" | grep -E '/Volumes/' | tail -1 | awk '{print $NF}')

          echo "→ Mounted at: $MOUNT_POINT"
          ls -la "$MOUNT_POINT"

          echo "→ Verifying Memo.app"
          if [ ! -d "$MOUNT_POINT/Memo.app" ]; then
            echo "ERROR: Memo.app not found in DMG" >&2
            hdiutil detach "$MOUNT_POINT" -quiet || true
            exit 1
          fi

          echo "→ Checking code signature"
          codesign --verify --verbose "$MOUNT_POINT/Memo.app"

          echo "→ Detaching DMG"
          hdiutil detach "$MOUNT_POINT" -quiet

          echo "Smoke test passed: Memo.app found and signature verified"
