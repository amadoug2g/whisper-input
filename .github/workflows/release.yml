name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0)"
        required: true
        default: "1.0"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build DMG and publish release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup test Keychain
        run: |
          security create-keychain -p "" build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"' | xargs)
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain

      - name: Build app and create DMG
        run: make dmg VERSION=${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "Memo v${{ steps.version.outputs.version }}"
          body: |
            ## Memo v${{ steps.version.outputs.version }}

            ### Install
            1. Download `Memo-v${{ steps.version.outputs.version }}.dmg`
            2. Open the DMG, drag **Memo** to Applications
            3. Launch Memo from Spotlight or Applications
            4. Add your OpenAI API key in Settings

            ### Requirements
            - macOS 13 Ventura or later
            - OpenAI API key (for Whisper transcription)
          files: Memo-v${{ steps.version.outputs.version }}.dmg
          draft: false
          prerelease: false
