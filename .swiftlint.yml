included:
  - Sources
  - Tests

excluded:
  - .build
  - Memo.app

disabled_rules:
  - trailing_whitespace
  - line_length
  - type_body_length
  - file_length
  - function_body_length

opt_in_rules:
  - empty_count
  - closure_spacing
  - force_unwrapping
  - implicit_return
  - modifier_order
  - private_over_fileprivate

force_unwrapping:
  severity: warning

identifier_name:
  min_length: 2
  excluded:
    - x
    - y
    - sf
    - fm

nesting:
  type_level: 2
